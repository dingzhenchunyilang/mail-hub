version: '3.8'

services:
  mail-hub:
    build: .
    container_name: mail-hub
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DB_PATH=/app/data/mail-hub.db
      - SYNC_INTERVAL=${SYNC_INTERVAL:-*/5 * * * *}
      # AI 配置（阶段四使用）
      # - AI_PROVIDER=${AI_PROVIDER}
      # - AI_API_KEY=${AI_API_KEY}
      # - AI_BASE_URL=${AI_BASE_URL}
    volumes:
      - mail-hub-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  mail-hub-data:
    driver: local
